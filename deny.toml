[bans]
deny = [
    { name = "ring" },
    { name = "aws-lc-rs" },
    { name = "openssl-sys" },
    { name = "openssl" },
    { name = "native-tls" },
]

[licenses]
allow = [
    "Apache-2.0",
    "MIT",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "OpenSSL",
    "MIT-0",
]
confidence-threshold = 0.8
